services:
  airo-fitness:
    build:
      context: .
    image: python3.14.2:trixie-slim-uv
    container_name: airo-fitness
    tty: true
    ipc: host
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/airo-fitness
      - /tmp/.X11-unix:/tmp/.X11-unix

  airo-fitness-gpu:
    extends:
      service: airo-fitness
    container_name: airo-fitness-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu
